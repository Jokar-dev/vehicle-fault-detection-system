<!DOCTYPE html>
<html>

<head>

<title>Vehicle Fault Detection System</title>
<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

<h1 class="title">🚗 Vehicle Fault Detection System</h1>

<div class="grid">

<div class="card">
<h2>🚀 Speed</h2>
<p id="speed">0 km/h</p>
</div>

<div class="card">
<h2>🔥 Engine Temperature</h2>
<p id="temp">0 °C</p>
</div>

<div class="card">
<h2>🔋 Battery Voltage</h2>
<p id="battery">0 V</p>
</div>

<div class="card">
<h2>🛞 Tire Pressure</h2>
<p id="tire">0 PSI</p>
</div>

</div>

<div class="alertBox">

<h2>⚠ System Alerts</h2>

<div id="alerts">
<p>Adjust vehicle parameters below</p>
</div>

</div>


<h2 style="margin-top:40px;">⚙ Vehicle Sensor Simulator</h2>

<div class="controls">

<label>Speed</label>
<input type="range" id="speedInput" min="0" max="160" value="60">

<label>Engine Temperature</label>
<input type="range" id="tempInput" min="60" max="140" value="90">

<label>Battery Voltage</label>
<input type="range" id="batteryInput" min="9" max="14" step="0.1" value="12">

<label>Tire Pressure</label>
<input type="range" id="tireInput" min="15" max="40" value="30">

</div>

</div>

<script src="script.js"></script>

</body>
</html>
